services:
  db:
    image: postgres:16-alpine
    container_name: fastapidelivery_db
    restart: always
    environment:
      POSTGRES_USER: fastapidelivery_user
      POSTGRES_PASSWORD: fastapidelivery
      POSTGRES_DB: fastapidelivery_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U fastapidelivery_user -d fastapidelivery_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: fastapidelivery-api:latest
    container_name: fastapidelivery_migrate
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    command: [ "uv", "run", "alembic", "upgrade", "head" ]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fastapidelivery-api:latest
    container_name: fastapidelivery_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./media:/app/media

volumes:
  postgres_data:
