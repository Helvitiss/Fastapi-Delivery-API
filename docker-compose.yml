services:
  db:
    image: postgres:16-alpine
    container_name: fastapidelivery_db
    restart: always
    environment:
      POSTGRES_USER: fastapidelivery_user
      POSTGRES_PASSWORD: fastapidelivery
      POSTGRES_DB: fastapidelivery_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapidelivery_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
      - ./media:/app/media

volumes:
  postgres_data:
